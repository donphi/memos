# ============================================================================
# LOCAL SYNC STACK
# PURPOSE: Pull all data locally for offline access, backup, or migration
#
# ALL VERSIONS come from .env, which mirrors config/versions.yaml.
#
# Usage:
#   cd local/
#   cp ../.env.example .env   # Edit with your remote URLs
#   docker compose -f docker-compose.local.yml up -d
#   python sync.py             # Pull data from remote
# ============================================================================

services:
  # ---- Local Memos (mirror of remote) ----
  memos-local:
    image: neosmemo/memos:${MEMOS_VERSION}
    container_name: memos-local
    restart: unless-stopped
    ports:
      - "${LOCAL_MEMOS_PORT:-5230}:5230"
    volumes:
      - memos-local-data:/var/opt/memos
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5230/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- Local Database ----
  db-local:
    build:
      context: ../database
      dockerfile: Dockerfile
      args:
        POSTGRES_VERSION: ${POSTGRES_VERSION}
    container_name: memos-router-db-local
    restart: unless-stopped
    ports:
      - "${LOCAL_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: memos_router
      POSTGRES_USER: router
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:-localdev}
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U router -d memos_router"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Local API (router) ----
  api-local:
    build:
      context: ..
      dockerfile: api/Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION}
    container_name: memos-router-api-local
    restart: unless-stopped
    ports:
      - "${LOCAL_ROUTER_PORT:-8780}:8780"
    environment:
      - MEMOS_BASE_URL=http://memos-local:5230
      - MEMOS_API_TOKEN=${MEMOS_API_TOKEN}
      - CATEGORY_MEMO_UID=${CATEGORY_MEMO_UID}
      - DATABASE_URL=postgresql://router:${LOCAL_POSTGRES_PASSWORD:-localdev}@db-local:5432/memos_router
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_CLASSIFY_ENABLED=${LLM_CLASSIFY_ENABLED:-false}
    volumes:
      - router-local-data:/app/data
      - ../config:/app/config:ro
    depends_on:
      memos-local:
        condition: service_healthy
      db-local:
        condition: service_healthy

volumes:
  memos-local-data:
    driver: local
  postgres-local-data:
    driver: local
  router-local-data:
    driver: local
